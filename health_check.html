<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企业知识库健康诊断</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-4xl mx-auto p-4 md:p-6">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold mb-2"><i class="fa fa-heartbeat text-red-500"></i> 企业知识库健康诊断</h1>
      <p class="text-gray-500">评估知识库时效性、完整性和维护质量，生成改进建议</p>
    </div>

    <!-- 知识库基本信息 -->
    <div class="bg-white rounded-lg shadow p-6 mb-4">
      <h2 class="font-bold text-lg mb-4"><i class="fa fa-database text-blue-500"></i> 知识库基本信息</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div>
          <label class="block text-sm font-medium mb-1">知识库类型</label>
          <select id="kbType" class="w-full border rounded px-3 py-2">
            <option value="tech">技术文档库</option>
            <option value="wiki">内部Wiki</option>
            <option value="product">产品知识库</option>
            <option value="sales">销售知识库</option>
            <option value="hr">人事/制度库</option>
            <option value="mixed">综合知识库</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">文档总数</label>
          <select id="docCount" class="w-full border rounded px-3 py-2">
            <option value="50">50篇以下</option>
            <option value="200">50-200篇</option>
            <option value="500">200-500篇</option>
            <option value="1000">500-1000篇</option>
            <option value="2000">1000篇以上</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">知识库已运行</label>
          <select id="kbAge" class="w-full border rounded px-3 py-2">
            <option value="3">3个月以下</option>
            <option value="6">3-6个月</option>
            <option value="12">6-12个月</option>
            <option value="24">1-2年</option>
            <option value="36">2年以上</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 5个维度评估 -->
    <div class="space-y-3 mb-6">
      <h2 class="font-bold text-lg"><i class="fa fa-tasks text-green-500"></i> 五维健康评估</h2>

      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold"><i class="fa fa-clock-o text-blue-500"></i> 一、时效性评估</h3>
          <span id="score1" class="text-lg font-bold text-blue-600">0/20</span>
        </div>
        <div class="space-y-2">
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-blue-50 cursor-pointer"><input type="radio" name="q1" value="0" onchange="calcScore()"><span class="text-sm">大部分文档超过1年未更新</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-blue-50 cursor-pointer"><input type="radio" name="q1" value="5" onchange="calcScore()"><span class="text-sm">约50%文档在半年内更新过</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-blue-50 cursor-pointer"><input type="radio" name="q1" value="10" onchange="calcScore()"><span class="text-sm">大部分文档3个月内更新过</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-blue-50 cursor-pointer"><input type="radio" name="q1" value="15" onchange="calcScore()"><span class="text-sm">有定期更新机制，文档较新</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-blue-50 cursor-pointer"><input type="radio" name="q1" value="20" onchange="calcScore()"><span class="text-sm">有自动化时效监控+定期审核机制</span></label>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold"><i class="fa fa-check-square-o text-green-500"></i> 二、完整性评估</h3>
          <span id="score2" class="text-lg font-bold text-green-600">0/20</span>
        </div>
        <div class="space-y-2">
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-green-50 cursor-pointer"><input type="radio" name="q2" value="0" onchange="calcScore()"><span class="text-sm">大量缺失关键文档，结构混乱</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-green-50 cursor-pointer"><input type="radio" name="q2" value="5" onchange="calcScore()"><span class="text-sm">核心文档存在，但目录结构不清晰</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-green-50 cursor-pointer"><input type="radio" name="q2" value="10" onchange="calcScore()"><span class="text-sm">有清晰的分类体系和目录结构</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-green-50 cursor-pointer"><input type="radio" name="q2" value="15" onchange="calcScore()"><span class="text-sm">文档完整，有模板规范和元数据</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-green-50 cursor-pointer"><input type="radio" name="q2" value="20" onchange="calcScore()"><span class="text-sm">完整模板体系+自动化完整性检查+交叉引用</span></label>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold"><i class="fa fa-wrench text-yellow-500"></i> 三、可维护性评估</h3>
          <span id="score3" class="text-lg font-bold text-yellow-600">0/20</span>
        </div>
        <div class="space-y-2">
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-yellow-50 cursor-pointer"><input type="radio" name="q3" value="0" onchange="calcScore()"><span class="text-sm">没有维护流程，谁有空谁改</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-yellow-50 cursor-pointer"><input type="radio" name="q3" value="5" onchange="calcScore()"><span class="text-sm">有负责人但缺乏标准流程</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-yellow-50 cursor-pointer"><input type="radio" name="q3" value="10" onchange="calcScore()"><span class="text-sm">有明确的维护流程和责任人</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-yellow-50 cursor-pointer"><input type="radio" name="q3" value="15" onchange="calcScore()"><span class="text-sm">有版本控制和变更记录</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-yellow-50 cursor-pointer"><input type="radio" name="q3" value="20" onchange="calcScore()"><span class="text-sm">自动化维护流程+版本管理+定期Review+Owner制</span></label>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold"><i class="fa fa-users text-purple-500"></i> 四、使用率评估</h3>
          <span id="score4" class="text-lg font-bold text-purple-600">0/20</span>
        </div>
        <div class="space-y-2">
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-purple-50 cursor-pointer"><input type="radio" name="q4" value="0" onchange="calcScore()"><span class="text-sm">几乎没人用，只有创建者自己看</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-purple-50 cursor-pointer"><input type="radio" name="q4" value="5" onchange="calcScore()"><span class="text-sm">少数团队成员偶尔使用</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-purple-50 cursor-pointer"><input type="radio" name="q4" value="10" onchange="calcScore()"><span class="text-sm">大部分团队成员定期使用</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-purple-50 cursor-pointer"><input type="radio" name="q4" value="15" onchange="calcScore()"><span class="text-sm">嵌入日常工作流程，使用频率高</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-purple-50 cursor-pointer"><input type="radio" name="q4" value="20" onchange="calcScore()"><span class="text-sm">全员深度使用+搜索优化+常用文档访问分析</span></label>
        </div>
      </div>

      <div class="bg-white rounded-lg shadow p-4">
        <div class="flex justify-between items-center mb-3">
          <h3 class="font-bold"><i class="fa fa-search text-indigo-500"></i> 五、搜索与发现评估</h3>
          <span id="score5" class="text-lg font-bold text-indigo-600">0/20</span>
        </div>
        <div class="space-y-2">
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-indigo-50 cursor-pointer"><input type="radio" name="q5" value="0" onchange="calcScore()"><span class="text-sm">无搜索功能，只能手动翻目录</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-indigo-50 cursor-pointer"><input type="radio" name="q5" value="5" onchange="calcScore()"><span class="text-sm">有基本搜索但准确率低</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-indigo-50 cursor-pointer"><input type="radio" name="q5" value="10" onchange="calcScore()"><span class="text-sm">搜索可以找到大部分内容</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-indigo-50 cursor-pointer"><input type="radio" name="q5" value="15" onchange="calcScore()"><span class="text-sm">全文搜索+标签+分类+热门推荐</span></label>
          <label class="flex items-center gap-2 p-2 bg-gray-50 rounded hover:bg-indigo-50 cursor-pointer"><input type="radio" name="q5" value="20" onchange="calcScore()"><span class="text-sm">AI搜索+智能推荐+知识图谱+使用分析</span></label>
        </div>
      </div>
    </div>

    <!-- 按钮区域 -->
    <div class="flex gap-3 mb-6">
      <button onclick="diagnose()" class="flex-1 bg-gradient-to-r from-blue-500 to-purple-600 text-white px-6 py-4 rounded-xl hover:from-blue-600 hover:to-purple-700 text-lg font-bold shadow-lg">
        <i class="fa fa-stethoscope"></i> 开始诊断
      </button>
      <button onclick="toggleHistory()" id="historyBtn" class="bg-white border border-gray-300 text-gray-700 px-4 py-4 rounded-xl hover:bg-gray-50 text-sm font-medium shadow">
        <i class="fa fa-history"></i> 历史趋势
      </button>
    </div>

    <!-- 历史趋势面板 -->
    <div id="historyPanel" class="hidden bg-white rounded-lg shadow p-6 mb-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-lg font-bold"><i class="fa fa-line-chart text-purple-500"></i> 历史健康趋势</h2>
        <button onclick="clearHistory()" class="text-sm px-3 py-1 bg-red-100 text-red-600 rounded hover:bg-red-200"><i class="fa fa-trash"></i> 清空记录</button>
      </div>
      <canvas id="historyChart" height="200"></canvas>
      <div class="mt-3 space-y-1" id="historyList"></div>
    </div>

    <!-- 诊断报告 -->
    <div id="report" class="hidden space-y-4">
      <div class="bg-white rounded-lg shadow p-6">
        <div class="flex justify-between items-center mb-4">
          <h2 class="text-xl font-bold"><i class="fa fa-file-medical-alt text-red-500"></i> 健康诊断报告</h2>
          <button onclick="exportReport()" class="bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600 text-sm"><i class="fa fa-download"></i> 导出报告</button>
        </div>

        <div class="text-center mb-6">
          <div class="inline-block relative">
            <div class="w-32 h-32 rounded-full border-8 flex items-center justify-center" id="scoreRing">
              <div><span id="totalScore" class="text-3xl font-bold">0</span><span class="text-sm text-gray-400">/100</span></div>
            </div>
            <div id="healthLabel" class="mt-2 text-lg font-bold"></div>
          </div>
        </div>

        <!-- Chart.js 雷达图 -->
        <div class="mb-6">
          <canvas id="radarChart" height="240"></canvas>
        </div>

        <div id="suggestions" class="space-y-3"></div>

        <div class="mt-4 p-4 bg-amber-50 rounded-lg">
          <h3 class="font-bold text-amber-800 mb-2"><i class="fa fa-check-circle"></i> 优先行动清单（按紧急程度排序）</h3>
          <div id="actionList" class="space-y-2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let radarChartInstance = null;
    let historyChartInstance = null;

    function calcScore() {
      for (let i = 1; i <= 5; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        document.getElementById(`score${i}`).textContent = (checked ? parseInt(checked.value) : 0) + '/20';
      }
    }

    const suggestionsMap = {
      timeliness: {
        low: ['建立文档定期审核机制，每季度review一次','为每篇文档添加"最后更新时间"字段','设置过期提醒：文档超过6个月未更新自动通知责任人','创建文档退役流程，明确标注已废弃文档'],
        mid: ['对未更新的文档分类处理：存档/更新/删除','为关键文档设置年度更新计划','引入文档版本号，让读者知道当前版本'],
        high: ['继续保持定期更新节奏','考虑引入自动化变更日志']
      },
      completeness: {
        low: ['制定文档模板规范，统一格式','建立知识库目录大纲，按主题分类','盘点现有文档，列出缺失的必须文档清单'],
        mid: ['补充缺失的关键文档（按优先级排序）','为文档添加标签和关键词元数据','建立文档间的交叉引用关系'],
        high: ['定期审查文档完整性','考虑引入知识图谱关联']
      },
      maintainability: {
        low: ['指定知识库管理员，明确维护职责','建立文档更新审批流程','启用版本控制（Git/Wiki历史功能）'],
        mid: ['制定文档撰写和更新SOP','建立变更记录和通知机制','定期组织文档维护培训'],
        high: ['持续优化维护流程','考虑引入自动化维护工具']
      },
      usage: {
        low: ['在新员工入职时介绍知识库的使用方法','将知识库嵌入日常工作流程（如审批前先查文档）','建立"找不到文档？来改进它"的文化'],
        mid: ['分析文档访问数据，优化常用文档可发现性','定期推送知识库更新摘要给团队','将文档贡献纳入绩效考核'],
        high: ['维持高使用率，持续收集用户反馈','考虑引入AI助手提升知识检索体验']
      },
      search: {
        low: ['升级到支持全文搜索的知识库平台','统一文档命名规范，标题要可搜索','建立标签体系，每篇文档至少3个标签'],
        mid: ['优化搜索排名，高频文档优先展示','添加热门搜索和推荐阅读功能','建立FAQ专区，解决常见问题快速查找'],
        high: ['保持搜索体验优化','探索AI语义搜索提升准确率']
      }
    };

    function getLevel(score) {
      if (score <= 5) return 'low';
      if (score <= 12) return 'mid';
      return 'high';
    }

    function getHealthLabel(score) {
      if (score >= 90) return { label: '优秀', color: 'text-green-600', ring: 'border-green-400' };
      if (score >= 75) return { label: '良好', color: 'text-blue-600', ring: 'border-blue-400' };
      if (score >= 55) return { label: '一般', color: 'text-yellow-600', ring: 'border-yellow-400' };
      if (score >= 35) return { label: '较差', color: 'text-orange-600', ring: 'border-orange-400' };
      return { label: '危险', color: 'text-red-600', ring: 'border-red-400' };
    }

    function diagnose() {
      const scores = [];
      for (let i = 1; i <= 5; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        scores.push(checked ? parseInt(checked.value) : 0);
      }

      const total = scores.reduce((a, b) => a + b, 0);
      const health = getHealthLabel(total);

      document.getElementById('totalScore').textContent = total;
      document.getElementById('scoreRing').className = `w-32 h-32 rounded-full border-8 flex items-center justify-center ${health.ring}`;
      document.getElementById('healthLabel').className = `mt-2 text-lg font-bold ${health.color}`;
      document.getElementById('healthLabel').textContent = health.label;

      // Chart.js 雷达图
      const dimLabels = ['时效性', '完整性', '可维护性', '使用率', '搜索与发现'];
      if (radarChartInstance) radarChartInstance.destroy();
      const ctx = document.getElementById('radarChart').getContext('2d');
      radarChartInstance = new Chart(ctx, {
        type: 'radar',
        data: {
          labels: dimLabels,
          datasets: [{
            label: '当前评分',
            data: scores,
            backgroundColor: 'rgba(59, 130, 246, 0.2)',
            borderColor: 'rgba(59, 130, 246, 1)',
            pointBackgroundColor: 'rgba(59, 130, 246, 1)',
            pointBorderColor: '#fff',
            pointHoverRadius: 5,
          }]
        },
        options: {
          responsive: true,
          scales: {
            r: {
              beginAtZero: true,
              max: 20,
              ticks: { stepSize: 5 }
            }
          },
          plugins: {
            legend: { display: false }
          }
        }
      });

      const dimNames = ['timeliness', 'completeness', 'maintainability', 'usage', 'search'];
      const suggestions = document.getElementById('suggestions');
      suggestions.innerHTML = '';

      dimNames.forEach((key, i) => {
        const score = scores[i];
        if (score < 15) {
          const level = getLevel(score);
          const items = suggestionsMap[key][level] || [];
          if (items.length > 0) {
            suggestions.innerHTML += `<div class="p-3 bg-gray-50 rounded-lg">
              <h4 class="font-bold text-sm mb-2">${dimLabels[i]}（${score}/20）— 改进建议</h4>
              <ul class="text-sm space-y-1">${items.map(item => `<li class="flex items-start gap-2"><span class="text-blue-500 mt-0.5">•</span><span>${item}</span></li>`).join('')}</ul>
            </div>`;
          }
        } else {
          suggestions.innerHTML += `<div class="p-3 bg-green-50 rounded-lg">
            <h4 class="font-bold text-sm text-green-700">${dimLabels[i]}（${score}/20）— 状态良好</h4>
            <p class="text-sm text-green-600">${suggestionsMap[key].high[0]}</p>
          </div>`;
        }
      });

      const actionList = document.getElementById('actionList');
      const allActions = [];
      dimNames.forEach((key, i) => {
        const score = scores[i];
        if (score < 15) {
          const level = getLevel(score);
          const items = suggestionsMap[key][level] || [];
          items.forEach(item => {
            allActions.push({ text: item, dim: dimLabels[i], priority: score });
          });
        }
      });
      allActions.sort((a, b) => a.priority - b.priority);

      actionList.innerHTML = allActions.length === 0
        ? '<p class="text-sm text-green-600">所有维度表现良好，继续保持！</p>'
        : allActions.map((a, i) => `<div class="flex items-start gap-2 text-sm">
            <span class="inline-flex items-center justify-center w-5 h-5 rounded-full bg-blue-100 text-blue-700 text-xs font-bold shrink-0">${i+1}</span>
            <div><span class="font-medium">[${a.dim}]</span> ${a.text}</div>
          </div>`).join('');

      document.getElementById('report').classList.remove('hidden');
      window.scrollTo({ top: document.getElementById('report').offsetTop - 20, behavior: 'smooth' });

      // 保存诊断历史
      saveDiagnosisHistory(scores, total);
    }

    // ====== localStorage 诊断历史 ======
    function saveDiagnosisHistory(scores, total) {
      const history = JSON.parse(localStorage.getItem('kbDiagnosisHistory') || '[]');
      const now = new Date();
      const timeStr = now.toLocaleString('zh-CN', { hour12: false });
      history.push({
        time: timeStr,
        date: now.toISOString().slice(0, 10),
        scores: scores,
        total: total,
        kbType: document.getElementById('kbType').selectedOptions[0].text
      });
      if (history.length > 50) history.splice(0, history.length - 50);
      localStorage.setItem('kbDiagnosisHistory', JSON.stringify(history));
    }

    function toggleHistory() {
      const panel = document.getElementById('historyPanel');
      panel.classList.toggle('hidden');
      if (!panel.classList.contains('hidden')) {
        renderHistoryChart();
      }
    }

    function renderHistoryChart() {
      const history = JSON.parse(localStorage.getItem('kbDiagnosisHistory') || '[]');
      const listEl = document.getElementById('historyList');
      if (history.length === 0) {
        listEl.innerHTML = '<div class="text-center text-gray-400 py-4"><i class="fa fa-inbox"></i> 暂无诊断记录</div>';
        if (historyChartInstance) historyChartInstance.destroy();
        return;
      }

      const dimLabels = ['时效性', '完整性', '可维护性', '使用率', '搜索与发现'];
      const labels = history.map(h => h.time.slice(5, 16));
      const datasets = dimLabels.map((name, di) => ({
        label: name,
        data: history.map(h => h.scores[di]),
        borderColor: ['#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#6366f1'][di],
        fill: false,
        tension: 0.3,
        pointRadius: 3
      }));

      if (historyChartInstance) historyChartInstance.destroy();
      const ctx = document.getElementById('historyChart').getContext('2d');
      historyChartInstance = new Chart(ctx, {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          scales: {
            y: { beginAtZero: true, max: 20, title: { display: true, text: '分数' } }
          }
        }
      });

      listEl.innerHTML = history.slice(-10).reverse().map(h =>
        `<div class="flex justify-between text-sm py-1 border-b border-gray-100">
          <span class="text-gray-500">${h.time}</span>
          <span class="font-medium">${h.total}/100</span>
          <span class="text-xs text-gray-400">${h.kbType || ''}</span>
        </div>`
      ).join('');
    }

    function clearHistory() {
      if (confirm('确定清空所有诊断历史记录？')) {
        localStorage.removeItem('kbDiagnosisHistory');
        renderHistoryChart();
        document.getElementById('historyList').innerHTML = '<div class="text-center text-gray-400 py-4">已清空</div>';
        if (historyChartInstance) historyChartInstance.destroy();
      }
    }

    function exportReport() {
      const total = document.getElementById('totalScore').textContent;
      const scores = [];
      for (let i = 1; i <= 5; i++) {
        const checked = document.querySelector(`input[name="q${i}"]:checked`);
        scores.push(checked ? parseInt(checked.value) : 0);
      }
      const dimNames = ['时效性', '完整性', '可维护性', '使用率', '搜索与发现'];
      const kbType = document.getElementById('kbType').selectedOptions[0].text;
      const health = ['危险', '较差', '一般', '良好', '优秀'][Math.min(4, Math.floor(total / 20))] || '未知';

      const report = `# 知识库健康诊断报告

诊断日期：${new Date().toLocaleString()}
知识库类型：${kbType}
总评分：${total}/100
健康状态：${health}

## 五维评分
${dimNames.map((d, i) => `- ${d}: ${scores[i]}/20`).join('\n')}

## 改进建议
${document.getElementById('suggestions').innerText || '无'}

## 优先行动清单
${document.getElementById('actionList').innerText || '所有维度表现良好'}

---
由企业知识库健康诊断工具自动生成`;

      const blob = new Blob([report], { type: 'text/markdown;charset=utf-8' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `知识库诊断报告_${new Date().toISOString().slice(0,10)}.md`;
      a.click();
    }
  </script>
</body>
</html>
